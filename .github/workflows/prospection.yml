name: Prospection Nocturne
on:
  workflow_dispatch:
jobs:
  prospection:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
      - run: python main.py
