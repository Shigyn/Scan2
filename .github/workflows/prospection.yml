name: Prospection Nocturne

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  prospection:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Créer credentials.json depuis secret
        run: echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
      - name: Lancer le script
        run: python main.py
